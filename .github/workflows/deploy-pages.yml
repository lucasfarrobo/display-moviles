name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Actualiza datos del Sheet cada hora
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch Google Sheet data
        run: npm run fetch-data
        env:
          GOOGLE_SHEETS_ID: 1261kGsRxL0xbsKI2vxD_dDelQwZpmGI27ecBrbs5G8M
          GOOGLE_SHEET_GID: "206598462"
          GOOGLE_SHEETS_PUBLIC: "true"

      - name: Build static site
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /display-moviles

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Deploy to GitHub Pages (attempt 3)
        id: deployment
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
